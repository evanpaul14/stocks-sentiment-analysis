<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>502 Bad Gateway - Stock Sentiment Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --border: #1e1e2e;
            --border2: #252535;
            --text: #e8e8f0;
            --text-muted: #6b6b85;
            --accent: #7c6aff;
            --accent2: #ff6a8a;
            --body: 'DM Sans', sans-serif;
            --display: 'Syne', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body.error-page {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 10px 24px;
            background: rgba(10, 10, 15, 0.92);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
        }

        .nav-logo {
            font-family: var(--display);
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-pill-btn {
            padding: 7px 12px;
            border-radius: 6px;
            border: 1px solid var(--border2);
            background: rgba(22, 22, 31, 0.9);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: border-color 0.2s, color 0.2s;
        }

        .nav-pill-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        .error-page main.container {
            min-height: calc(100vh - 60px - 114px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 92px;
            padding-bottom: 34px;
        }

        .error-container {
            width: min(620px, 100%);
            border-radius: 14px;
            border: 1px solid var(--border2);
            background:
                radial-gradient(900px 320px at 10% -20%, rgba(124, 106, 255, 0.18), transparent 52%),
                radial-gradient(580px 240px at 88% 0%, rgba(45, 255, 184, 0.1), transparent 58%),
                var(--surface);
            padding: 34px 28px;
            text-align: center;
        }

        .error-code {
            font-family: var(--display);
            font-size: clamp(56px, 10vw, 88px);
            line-height: 0.95;
            letter-spacing: -0.04em;
            color: var(--accent2);
            margin-bottom: 14px;
        }

        .error-title {
            font-family: var(--display);
            font-size: clamp(24px, 4.2vw, 36px);
            margin-bottom: 8px;
        }

        .error-message {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 auto 20px;
            max-width: 520px;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .home-link {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }

        .home-link {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #fff;
        }

        .home-link:hover {
            background: #9180ff;
            border-color: #9180ff;
            transform: translateY(-1px);
        }

        .site-footer {
            margin-top: auto;
            padding: 30px 0;
            border-top: 1px solid var(--border);
            text-align: right;
            color: #71717a;
            font-size: 14px;
        }

        .site-footer .container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .site-footer-links {
            display: flex;
            justify-content: flex-end;
            gap: 24px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .site-footer a {
            color: #a78bfa;
            text-decoration: none;
        }

        .site-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .container {
                padding-left: 14px;
                padding-right: 14px;
            }

            .top-nav {
                padding: 10px 14px;
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                width: 100%;
                justify-content: flex-start;
            }

            .error-page main.container {
                min-height: calc(100vh - 60px - 114px);
                padding-top: 154px;
                padding-bottom: 22px;
            }

            .error-container {
                padding: 26px 18px;
            }
        }
    </style>
</head>
<body class="error-page" data-page="error">
    <header class="top-nav" aria-label="Main navigation">
        <a class="nav-logo" href="/">Stock Sentiment Analysis<span>.</span></a>
        <nav class="nav-links" aria-label="Primary links">
            <a class="nav-pill-btn" href="/trending-list">Trending</a>
            <a class="nav-pill-btn" href="/watchlist">Watchlist</a>
            <a class="nav-pill-btn" href="/market-summary">Market Summary</a>
        </nav>
    </header>

    <main class="container" role="main">
        <section class="error-container" aria-labelledby="errorTitle">
            <p class="error-code" aria-hidden="true">502</p>
            <h1 class="error-title" id="errorTitle">Service Temporarily Unavailable</h1>
            <p class="error-message">The server received an invalid response while processing your request. Please retry in a moment.</p>
            <div class="error-actions">
                <a href="/" class="home-link">Go to Homepage</a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <nav class="site-footer-links" aria-label="Footer navigation">
                <a href="/privacy">Privacy Policy</a>
            </nav>
            <p>&copy; <span id="currentYear">2026</span> Stock Sentiment Analysis. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('currentYear').textContent = String(new Date().getFullYear());
    </script>
</body>
</html>
