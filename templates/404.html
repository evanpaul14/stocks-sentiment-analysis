<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 Not Found - Stock Sentiment Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body.error-page {
            padding-bottom: 0;
        }

        .error-page main.container {
            min-height: calc(100vh - 60px - 114px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 92px;
            padding-bottom: 34px;
        }

        .error-container {
            width: min(620px, 100%);
            border-radius: 14px;
            border: 1px solid var(--border2);
            background:
                radial-gradient(900px 320px at 10% -20%, rgba(124, 106, 255, 0.18), transparent 52%),
                radial-gradient(580px 240px at 88% 0%, rgba(45, 255, 184, 0.1), transparent 58%),
                var(--surface);
            padding: 34px 28px;
            text-align: center;
        }

        .error-code {
            font-family: var(--display);
            font-size: clamp(56px, 10vw, 88px);
            line-height: 0.95;
            letter-spacing: -0.04em;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .error-title {
            font-family: var(--display);
            font-size: clamp(24px, 4.2vw, 36px);
            margin-bottom: 8px;
        }

        .error-message {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 auto 20px;
            max-width: 520px;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .home-link,
        .secondary-link {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }

        .home-link {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #fff;
        }

        .home-link:hover {
            background: #9180ff;
            border-color: #9180ff;
            transform: translateY(-1px);
        }

        .secondary-link {
            color: var(--text);
            border: 1px solid var(--border2);
            background: rgba(22, 22, 31, 0.9);
        }

        .secondary-link:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        @media (max-width: 640px) {
            .error-page main.container {
                min-height: calc(100vh - 60px - 114px);
                padding-top: 154px;
                padding-bottom: 22px;
            }

            .error-container {
                padding: 26px 18px;
            }
        }
    </style>
</head>
<body class="error-page" data-page="error">
    <header class="top-nav" aria-label="Main navigation">
        <div class="nav-logo-wrap">
            <a class="home-title-link nav-logo" href="/">Stock Sentiment Analysis<span>.</span></a>
        </div>
        <div class="nav-center">
            <div class="search-wrap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" placeholder="Search ticker, company name..." autocomplete="off" aria-label="Search disabled on error pages" disabled>
            </div>
            <button class="search-btn" aria-label="Search disabled on error pages" disabled>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </button>
        </div>
        <nav class="nav-links" aria-label="Primary links">
            <a class="nav-pill-btn" href="/trending-list">Trending</a>
            <a class="nav-pill-btn" href="/watchlist">Watchlist</a>
            <a class="nav-pill-btn" href="/market-summary">Market Summary</a>
        </nav>
    </header>

    <main class="container" role="main">
        <section class="error-container" aria-labelledby="errorTitle">
            <p class="error-code" aria-hidden="true">404</p>
            <h1 class="error-title" id="errorTitle">Page Not Found</h1>
            <p class="error-message">The page you requested may have moved, been removed, or never existed.</p>
            <div class="error-actions">
                <a href="/" class="home-link">Go to Homepage</a>
                <a href="/trending-list" class="secondary-link">View Trending</a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <nav class="site-footer-links" aria-label="Footer navigation">
                <a href="/privacy">Privacy Policy</a>
            </nav>
            <p>&copy; {{ now().year if now is defined else '2026' }} Stock Sentiment Analysis. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
